on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    container: rockylinux:9

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpm-sign pinentry
          dnf groupinstall -y "Development Tools"
          curl -O https://musl.libc.org/releases/musl-1.2.4.tar.gz
          tar -xf musl-1.2.4.tar.gz
          cd musl-1.2.4
          ./configure --prefix=/usr/local/musl
          make
          sudo make install
          echo "/usr/local/musl/bin" >> $GIHUB_PATH
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare RPM sources
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          cp target/x86_64-unknown-linux-musl/release/xoa-proxy ~/rpmbuild/SOURCES/
          cp packaging/xoa-proxy.service                        ~/rpmbuild/SOURCES/
          cp packaging/xoa-proxy.logrotate                      ~/rpmbuild/SOURCES/
          cp SPECS/xoa-proxy.spec                               ~/rpmbuild/SPECS/

      - name: Build RPM
        run: rpmbuild -ba ~/rpmbuild/SPECS/xoa-proxy.spec
          
      - name: Sign RPM
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          cat >> ~/.rpmmacros << 'EOF'
          %_gpg_name XCP-ng Community Edition
          %__gpg_sign_cmd %{__gpg} gpg --batch --yes --pinentry-mode loopback -u "%{_gpg_name}" --detach-sign --armor -o %{__signature_filename} %{__plaintext_filename}
          EOF
          rpmsign --addsign ~/rpmbuild/RPMS/x86_64/xoa-proxy-*.rpm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ~/rpmbuild/RPMS/x86_64/xoa-proxy-*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
