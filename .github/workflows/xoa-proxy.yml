name: Build and Sign XOA-proxy RPM

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Emergency release tag'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: rockylinux:9
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive version and release tag
        id: derive-meta
        run: |
          # 1. Determine Git Release Tag Target
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.release_tag }}" ]; then
              TAG="${{ github.event.inputs.release_tag }}"
            else
              TAG="Release-$(date +'%Y%m%d%H%M')-run${{ github.run_number }}"
            fi
          fi
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV

          # 2. Determine Safe RPM Package Version
          CLEAN_VER="${TAG#v}"
          if [[ ! "$CLEAN_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            CARGO_VER=$(grep -m1 '^version *=' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
            CLEAN_VER="${CARGO_VER:-0.1.0}"
          fi
          echo "PKG_VERSION=${CLEAN_VER}" >> $GITHUB_ENV
          
          echo "▶ Target release tag: ${TAG}"
          echo "▶ Computed RPM version: ${CLEAN_VER}"

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpm-sign pinentry
          dnf groupinstall -y "Development Tools"
          curl -O https://musl.libc.org/releases/musl-1.2.4.tar.gz
          tar -xf musl-1.2.4.tar.gz
          cd musl-1.2.4
          ./configure --prefix=/usr/local/musl
          make
          make install
          echo "/usr/local/musl/bin" >> $GITHUB_PATH
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare RPM sources
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          cp target/x86_64-unknown-linux-musl/release/xoa-proxy ~/rpmbuild/SOURCES/
          cp packaging/xoa-proxy.service                        ~/rpmbuild/SOURCES/
          cp packaging/xoa-proxy.logrotate                      ~/rpmbuild/SOURCES/
          cp packaging/83-xoa-proxy.preset                      ~/rpmbuild/SOURCES/
          cp SPECS/xoa-proxy.spec                               ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/xoa-proxy.spec \
            --define "pkg_version ${PKG_VERSION}"
          
      - name: Sign RPM
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import passphrase-protected key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --import

          # Configure gpg-agent for non-TTY passphrase delivery
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

          # Pre-cache passphrase in agent — rpmsign will use it transparently
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 --quiet --no-tty \
            -u "XCP-ng Home-Laber Edition" \
            --sign --output /dev/null /dev/null

          # Write cleanly instead of blindly appending
          cat > ~/.rpmmacros << 'EOF'
          %_gpg_name XCP-ng Home-Laber Edition
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor \
            --no-secmem-warning --pinentry-mode loopback \
            -u "%{_gpg_name}" -sbo %{__signature_filename} \
            --digest-algo sha256 %{__plaintext_filename}
          EOF

          rpmsign --addsign ~/rpmbuild/RPMS/x86_64/xoa-proxy-*.rpm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ~/rpmbuild/RPMS/x86_64/xoa-proxy-*.rpm
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
